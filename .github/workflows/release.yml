name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.0.0) — leave empty to use current pubspec version"
        required: false
        type: string
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Windows
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Archive Windows build
        run: |
          cd build/windows/x64/runner/Release
          7z a -tzip "${{ github.workspace }}/typer_kids-windows-x64.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: typer_kids-windows-x64
          path: typer_kids-windows-x64.zip

  # ─────────────────────────────────────────────
  # macOS
  # ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Archive macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r "${{ github.workspace }}/typer_kids-macos-universal.zip" "typer_kids.app"

      - uses: actions/upload-artifact@v4
        with:
          name: typer_kids-macos-universal
          path: typer_kids-macos-universal.zip

  # ─────────────────────────────────────────────
  # Linux
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Archive Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar czf "${{ github.workspace }}/typer_kids-linux-x64.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: typer_kids-linux-x64
          path: typer_kids-linux-x64.tar.gz

  # ─────────────────────────────────────────────
  # Create / update GitHub Release
  # ─────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VER=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
            echo "tag=${VER}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Typer Kids ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/typer_kids-windows-x64/typer_kids-windows-x64.zip
            artifacts/typer_kids-macos-universal/typer_kids-macos-universal.zip
            artifacts/typer_kids-linux-x64/typer_kids-linux-x64.tar.gz
