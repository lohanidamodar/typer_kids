name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.0.0) — leave empty to use current pubspec version"
        required: false
        type: string
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Windows
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Bundle VC++ Runtime DLLs
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          # Find the latest MSVC CRT redistributable directory
          $vcDirs = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\*\*\VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT" -ErrorAction SilentlyContinue
          $vcDir = $vcDirs | Sort-Object FullName | Select-Object -Last 1
          if ($vcDir) {
            Write-Host "Bundling VC++ Runtime from: $($vcDir.FullName)"
            Copy-Item "$($vcDir.FullName)\msvcp140.dll" "$releaseDir\" -ErrorAction SilentlyContinue
            Copy-Item "$($vcDir.FullName)\vcruntime140.dll" "$releaseDir\" -ErrorAction SilentlyContinue
            Copy-Item "$($vcDir.FullName)\vcruntime140_1.dll" "$releaseDir\" -ErrorAction SilentlyContinue
          } else {
            Write-Warning "VC++ Runtime DLLs not found — users may need to install VC++ Redistributable"
          }

      - name: Archive Windows build
        run: |
          cd build/windows/x64/runner/Release
          7z a -tzip "${{ github.workspace }}/typer_kids-windows-x64.zip" .

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:\s+(\S+)').Matches.Groups[1].Value -replace '\+.*', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" installers\windows\setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: typer_kids-windows-x64
          path: |
            typer_kids-windows-x64.zip
            typer_kids-windows-x64-setup.exe

  # ─────────────────────────────────────────────
  # macOS
  # ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Archive macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r "${{ github.workspace }}/typer_kids-macos-universal.zip" "Typer Kids.app"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Typer Kids" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Typer Kids.app" 150 190 \
            --hide-extension "Typer Kids.app" \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "typer_kids-macos-universal.dmg" \
            "build/macos/Build/Products/Release/Typer Kids.app" \
            || true
          test -f typer_kids-macos-universal.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: typer_kids-macos-universal
          path: |
            typer_kids-macos-universal.zip
            typer_kids-macos-universal.dmg

  # ─────────────────────────────────────────────
  # Linux
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Archive Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar czf "${{ github.workspace }}/typer_kids-linux-x64.tar.gz" .

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/applications

          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          cp linux/runner/app_icon.png AppDir/usr/share/icons/hicolor/256x256/apps/typer_kids.png
          cp linux/runner/app_icon.png AppDir/typer_kids.png

          cp installers/linux/com.lohanidamodar.typer_kids.desktop AppDir/usr/share/applications/
          cp installers/linux/com.lohanidamodar.typer_kids.desktop AppDir/com.lohanidamodar.typer_kids.desktop

          cp installers/linux/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun

          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir typer_kids-linux-x64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: typer_kids-linux-x64
          path: |
            typer_kids-linux-x64.tar.gz
            typer_kids-linux-x64.AppImage

  # ─────────────────────────────────────────────
  # Create / update GitHub Release
  # ─────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VER=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
            echo "tag=${VER}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Typer Kids ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/typer_kids-windows-x64/typer_kids-windows-x64.zip
            artifacts/typer_kids-windows-x64/typer_kids-windows-x64-setup.exe
            artifacts/typer_kids-macos-universal/typer_kids-macos-universal.zip
            artifacts/typer_kids-macos-universal/typer_kids-macos-universal.dmg
            artifacts/typer_kids-linux-x64/typer_kids-linux-x64.tar.gz
            artifacts/typer_kids-linux-x64/typer_kids-linux-x64.AppImage
