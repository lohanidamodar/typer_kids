name: typer_kids
description: "A fun typing tutor app for kids with colorful lessons and interactive keyboard."
publish_to: 'none'
version: 1.1.2+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1
  audioplayers: ^6.4.0
  confetti: ^0.8.0
  go_router: ^17.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.8.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/app_icon.png"
  android: false
  ios: false
  web:
    generate: true
    image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/app_icon.png"
  linux:
    generate: true
    image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/app_icon.png
